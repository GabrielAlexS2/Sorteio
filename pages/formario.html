<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Empresa Importante - Formulário</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jsPDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
    <!-- EmailJS Library -->
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
  </head>
  <body>
    <div class="container mt-5 mb-5">
      <h1 class="text-center mb-4">Formulário - Empresa Importante</h1>
      <form id="formulario">
        <div class="mb-3">
          <label for="nome" class="form-label">Nome</label>
          <input
            type="text"
            class="form-control"
            id="nome"
            placeholder="Digite seu nome"
            required
          />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="Digite seu email"
            required
          />
        </div>
        <div class="mb-3">
          <label for="telefone" class="form-label">Telefone</label>
          <input
            type="tel"
            class="form-control"
            id="telefone"
            placeholder="Digite seu telefone"
            required
          />
        </div>
        <div class="mb-3">
          <label for="cidade" class="form-label">Cidade</label>
          <select class="form-select" id="cidade" required>
            <option value="" disabled selected>Selecione sua Cidade</option>
            <option value="Fortaleza">Fortaleza</option>
            <option value="Guiana">Guiana Brasileira</option>
            <option value="Caucaia">Caucaia</option>
            <option value="TangaMandapio">TangaMandapio</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="estado" class="form-label">Estado</label>
          <select class="form-select" id="estado" required>
            <option value="" disabled selected>Selecione seu estado</option>
            <option value="AC">Acre (AC)</option>
            <option value="AL">Alagoas (AL)</option>
            <option value="AP">Amapá (AP)</option>
            <option value="AM">Amazonas (AM)</option>
            <option value="BA">Bahia (BA)</option>
            <option value="CE">Ceará (CE)</option>
            <option value="DF">Distrito Federal (DF)</option>
            <option value="ES">Espírito Santo (ES)</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="cep" class="form-label">CEP</label>
          <input
            type="text"
            class="form-control"
            id="cep"
            placeholder="Digite o CEP da sua rua"
            required
          />
        </div>
        <div class="mb-3">
          <label for="etnia" class="form-label">Etnia (Raça)</label>
          <select class="form-select" id="etnia" required>
            <option value="" disabled selected>Selecione sua etnia</option>
            <option value="Branca">Branca</option>
            <option value="Preta">Preta</option>
            <option value="Parda">Parda</option>
            <option value="Amarela">Amarela</option>
            <option value="Indígena">Indígena</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="deficiencia" class="form-label"
            >Possui Deficiência?</label
          >
          <select
            class="form-select"
            id="deficiencia"
            onchange="toggleDeficienciaDescricao()"
            required
          >
            <option value="" disabled selected>Selecione</option>
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
          </select>
        </div>
        <div
          class="mb-3"
          id="deficienciaDescricaoContainer"
          style="display: none"
        >
          <label for="deficienciaDescricao" class="form-label"
            >Qual deficiência?</label
          >
          <input
            type="text"
            class="form-control"
            id="deficienciaDescricao"
            placeholder="Descreva sua deficiência"
          />
        </div>
        <div class="mb-3">
          <label for="cnpj" class="form-label">CNPJ da Empresa</label>
          <input
            type="text"
            class="form-control"
            id="cnpj"
            placeholder="Digite o CNPJ da sua empresa"
            required
          />
        </div>
        <div class="mb-3">
          <label for="nomeEmpresa" class="form-label">Nome da Empresa</label>
          <input
            type="text"
            class="form-control"
            id="nomeEmpresa"
            placeholder="Digite o nome da sua empresa"
            required
          />
        </div>
        <div class="mb-3">
          <label for="sobreEmpresa" class="form-label">Sobre a Empresa</label>
          <textarea
            class="form-control"
            id="sobreEmpresa"
            rows="4"
            placeholder="Descreva sobre o que sua empresa trata"
            required
          ></textarea>
        </div>
        <div class="mb-3">
          <label for="mensagem" class="form-label">Mensagem</label>
          <textarea
            class="form-control"
            id="mensagem"
            rows="4"
            placeholder="Digite o que você busca"
            required
          ></textarea>
        </div>
        <button type="button" class="btn btn-primary" onclick="gerarPDF()">
          Baixar PDF
        </button>
        <button type="button" class="btn btn-success" onclick="enviarEmail()">
          Enviar por Email
        </button>
      </form>
    </div>
  </body>
  <script src="formulario.js"></script>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="/styles/Calculadora.css">
</head>
<body>
    <main class="container-fluid d-flex flex-column align-items-center justify-content-center vh-100">
        <div class="container my-5 shadow rounded-3" id="calculadora">
            <div class="row">
                <div class="text-bg-dark text-center align-content-center rounded-3" id="HeaderCalculadora">
                    Espaço para Resposta!
                </div>
            </div>    
            <div class="row p-3">
                <div class="col-3"><button class="col-12 rounded-2 text-bg-info">M+</button></div>
                <div class="col-3"><button class="col-12 rounded-2 text-bg-info">M-</button></div>
                <div class="col-3"><button class="col-12 rounded-2 text-bg-info">Mc</button></div>
                <div class="col-3"><button class="col-12 rounded-2 text-bg-info">/</button></div>
            </div>
            <div class="row p-3">
                <div class="row mx-1 buttonsCal">
                    <div class="col-4"><button class="col-12 rounded-2">1</button></div>
                    <div class="col-4"><button class="col-12 rounded-2">2</button></div>
                    <div class="col-4"><button class="col-12 rounded-2">3</button></div>
                </div>
                <div class="col-3"><button class="col-12 rounded-2 text-bg-info">*</button></div>
            </div>
            <div class="row p-3">
                <div class="row mx-1 buttonsCal">
                    <div class="col-4"><button class="col-12 rounded-2">4</button></div>
                    <div class="col-4"><button class="col-12 rounded-2">5</button></div>
                    <div class="col-4"><button class="col-12 rounded-2">6</button></div>
                </div>
                <div class="col-3"><button class="col-12 rounded-2 text-bg-info">+</button></div>
            </div>
            <div class="row p-3">
                <div class="row mx-1 buttonsCal">
                    <div class="col-4"><button class="col-12 rounded-2">7</button></div>
                    <div class="col-4"><button class="col-12 rounded-2">8</button></div>
                    <div class="col-4"><button class="col-12 rounded-2">9</button></div>
                </div>
                <div class="col-3"><button class="col-12 rounded-2 text-bg-info">-</button></div>
            </div>
            <div class="row p-3">
                <div class="row mx-1 buttonsCal">
                    <div class="col-4"><button class="col-12 rounded-2">.</button></div>
                    <div class="col-4"><button class="col-12 rounded-2">0</button></div>
                    <div class="col-4"><button class="col-12 rounded-2">,</button></div>
                </div>
                <div class="col-3"><button class="col-12 rounded-2 text-bg-info">=</button></div>
            </div>
        </div>
    </main>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
<script src="/scripts/Calculadora.js"></script>
</html>
